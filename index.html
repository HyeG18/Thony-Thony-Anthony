<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Cumpleaños Anthony Thony Profe</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="pirate-flags">
        <div class="flag flag-1">
            <svg viewBox="0 0 100 70" class="jolly-roger">
                <circle cx="50" cy="35" r="30" fill="white"/>
                <circle cx="50" cy="35" r="3" fill="black"/>
                <circle cx="40" cy="30" r="5" fill="black"/>
                <circle cx="60" cy="30" r="5" fill="black"/>
                <path d="M35 45 Q50 55 65 45" stroke="black" stroke-width="3" fill="none"/>
                <path d="M50 5 L50 0 L60 10 L40 10 Z" fill="black"/>
                <text x="50" y="20" text-anchor="middle" font-size="8" fill="black">♥</text>
            </svg>
        </div>
        <div class="flag flag-2">
            <svg viewBox="0 0 100 70" class="jolly-roger">
                <circle cx="50" cy="35" r="30" fill="white"/>
                <circle cx="50" cy="35" r="3" fill="black"/>
                <circle cx="40" cy="30" r="5" fill="black"/>
                <circle cx="60" cy="30" r="5" fill="black"/>
                <path d="M35 45 Q50 55 65 45" stroke="black" stroke-width="3" fill="none"/>
                <path d="M50 5 L50 0 L60 10 L40 10 Z" fill="black"/>
                <text x="50" y="20" text-anchor="middle" font-size="8" fill="black">♥</text>
            </svg>
        </div>
        <div class="flag flag-3">
            <svg viewBox="0 0 100 70" class="jolly-roger">
                <circle cx="50" cy="35" r="30" fill="white"/>
                <circle cx="50" cy="35" r="3" fill="black"/>
                <circle cx="40" cy="30" r="5" fill="black"/>
                <circle cx="60" cy="30" r="5" fill="black"/>
                <path d="M35 45 Q50 55 65 45" stroke="black" stroke-width="3" fill="none"/>
                <path d="M50 5 L50 0 L60 10 L40 10 Z" fill="black"/>
                <text x="50" y="20" text-anchor="middle" font-size="8" fill="black">♥</text>
            </svg>
        </div>
    </div>

    <div class="confetti-container" id="confetti-container"></div>

    <header class="banner">
        <div class="banner-content">
            <h1 class="title">Feliz Cumpleaños</h1>
            <h2 class="subtitle">Anthony Thony Profe</h2>
            <div class="heart-container">
                <span class="heart">♥</span>
                <span class="heart">♥</span>
                <span class="heart">♥</span>
            </div>
        </div>
        <div class="waves">
            <svg class="wave" viewBox="0 0 1440 120" preserveAspectRatio="none">
                <path d="M0,60 C360,120 720,0 1080,60 C1260,90 1350,75 1440,60 L1440,120 L0,120 Z" fill="rgba(196, 30, 58, 0.3)"/>
            </svg>
            <svg class="wave" viewBox="0 0 1440 120" preserveAspectRatio="none">
                <path d="M0,80 C240,20 480,100 720,60 C960,20 1200,80 1440,40 L1440,120 L0,120 Z" fill="rgba(139, 69, 19, 0.2)"/>
            </svg>
        </div>
    </header>

    <main class="main-content">
        <div class="carousel-container">
            <div class="carousel" id="carousel">
                <div class="carousel-track" id="carousel-track">
                    <div class="carousel-slide featured">
                        <img src="img/sebas,tony y anthony.jpg" alt="Sebas, Tony y Anthony">
                    </div>
                    <div class="carousel-slide">
                        <img src="img/乔巴.jfif" alt="Chopper">
                    </div>
                    <div class="carousel-slide">
                        <img src="img/Chopper cute🥺💘.jfif" alt="Chopper cute">
                    </div>
                    <div class="carousel-slide">
                        <img src="img/chopper gym.jfif" alt="Chopper gym">
                    </div>
                    <div class="carousel-slide">
                        <img src="img/descargar (5).jfif" alt="Chopper">
                    </div>
                    <div class="carousel-slide">
                        <img src="img/Binny Bun on Twitter _ One piece chopper, Manga anime one piece, One piece manga.jfif" alt="Chopper">
                    </div>
                </div>
            </div>
            <button class="carousel-btn prev" id="prev-btn">❮</button>
            <button class="carousel-btn next" id="next-btn">❯</button>
            <div class="carousel-dots" id="carousel-dots"></div>
        </div>

        <div class="photo-highlight">
            <h3>A por el One Piece con Chopper</h3>
            <div class="highlight-frame">
                <img src="img/sebas,tony y anthony.jpg" alt="Sebas, Tony y Anthony" class="highlight-photo">
            </div>
        </div>
    </main>

    <div class="floating-hearts" id="floating-hearts"></div>
    <div class="floating-stars" id="floating-stars"></div>

    <div class="audio-control">
        <button id="audio-toggle" class="audio-btn">
            <span id="audio-icon">🎵</span>
            <span id="audio-text">Música</span>
        </button>
        <input type="range" id="volume-slider" min="0" max="100" value="30">
    </div>

    <audio id="birthday-audio" loop>
        <source src="audio/Tony Tony Chopper and Luffy,Boku wa doctor Tony Tony Chopper.mp3" type="audio/mpeg">
    </audio>

    <footer class="footer">
        <p>🎂 Con mucho cariño de parte de tu amigo Sebas 🎂</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
